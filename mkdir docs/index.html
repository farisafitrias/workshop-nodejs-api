<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Judul halaman -->
    <title>Aplikasi Data Mahasiswa</title>

    <!-- Bootstrap 5 CDN -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <!-- Menghubungkan file CSS custom -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Container utama Bootstrap -->
    <div class="container py-5">

        <!-- Judul aplikasi -->
        <div class="text-center mb-5">
            <h1 class="fw-bold">Aplikasi Data Mahasiswa</h1>
            <p class="text-muted">
                Belajar Fetch API dengan HTML, CSS, JavaScript, dan Bootstrap
            </p>
        </div>

        <!-- Kotak alert / notifikasi -->
        <!-- Alert akan diisi otomatis dari JavaScript -->
        <div id="alertBox"></div>

        <div class="row">

            <!-- Kolom kiri: Form tambah mahasiswa -->
            <div class="col-md-4 mb-4">

                <!-- Card Bootstrap untuk form -->
                <div class="card form-card shadow-sm">
                    <div class="card-body">

                        <h4 class="mb-4">Tambah Mahasiswa</h4>

                        <!-- Form input mahasiswa -->
                        <form id="studentForm">

                            <!-- Input nama -->
                            <div class="mb-3">
                                <label class="form-label">Nama</label>
                                <input
                                    type="text"
                                    id="name"
                                    class="form-control"
                                    placeholder="Masukkan nama"
                                    required
                                />
                            </div>

                            <!-- Input usia -->
                            <div class="mb-3">
                                <label class="form-label">Usia</label>
                                <input
                                    type="number"
                                    id="age"
                                    class="form-control"
                                    placeholder="Masukkan usia"
                                    required
                                />
                            </div>

                            <!-- Input nilai -->
                            <div class="mb-3">
                                <label class="form-label">Nilai</label>
                                <input
                                    type="text"
                                    id="grade"
                                    class="form-control"
                                    placeholder="Contoh: A"
                                    required
                                />
                            </div>

                            <!-- Tombol submit -->
                            <button
                                type="submit"
                                class="btn btn-primary w-100"
                            >
                                Tambah Mahasiswa
                            </button>

                        </form>
                    </div>
                </div>
            </div>

            <!-- Kolom kanan: Tabel mahasiswa -->
            <div class="col-md-8">

                <div class="card shadow-sm">
                    <div class="card-body">

                        <h4 class="mb-4">Daftar Mahasiswa</h4>

                        <!-- Tabel Bootstrap -->
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">

                                <!-- Header tabel -->
                                <thead class="table-header">
                                    <tr>
                                        <th>ID</th>
                                        <th>Nama</th>
                                        <th>Usia</th>
                                        <th>Nilai</th>
                                    </tr>
                                </thead>

                                <!-- Body tabel -->
                                <!-- Data akan dimasukkan dari JavaScript -->
                                <tbody id="studentTableBody">

                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Menghubungkan file JavaScript -->
    <script src="app.js"></script>
</body>
</html>
